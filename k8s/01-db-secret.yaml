# A Secret holds sensitive values (here, the database credentials). Kubernetes
# stores them separately from the app config and injects them as env vars.
#
# `stringData` lets us write plain text; Kubernetes base64-encodes it for us.
# CHANGE THE PASSWORD before any real deployment.
apiVersion: v1
kind: Secret
metadata:
  name: lumen-db
  namespace: lumen
type: Opaque
stringData:
  POSTGRES_USER: lumen
  POSTGRES_PASSWORD: change-me-in-production
  POSTGRES_DB: lumen
