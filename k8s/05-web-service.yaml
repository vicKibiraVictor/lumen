# A ClusterIP Service is a stable internal address + load balancer for the web
# pods. Pods come and go with changing IPs; this name (`lumen-web`) stays put
# and spreads traffic across whichever pods are healthy.
apiVersion: v1
kind: Service
metadata:
  name: lumen-web
  namespace: lumen
spec:
  type: ClusterIP
  selector:
    app: lumen-web       # matches the Deployment's pod label
  ports:
    - port: 80           # the Service listens on 80...
      targetPort: 3000   # ...and forwards to the container's 3000
