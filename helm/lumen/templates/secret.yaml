{{/* Create the DB credentials Secret — unless you brought your own. */}}
{{- if not .Values.db.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lumen.fullname" . }}-db
  labels:
    {{- include "lumen.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.db.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.db.password | quote }}
  POSTGRES_DB: {{ .Values.db.name | quote }}
{{- end }}
