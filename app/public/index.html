<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumen — task manager</title>
  <meta name="description" content="Lumen, a beautiful task manager backed by Postgres." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='12' fill='%237c5cff'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>

  <main class="app">
    <!-- Header -->
    <header class="topbar">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22">
            <defs>
              <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#9b7bff"/>
                <stop offset="1" stop-color="#5cc8ff"/>
              </linearGradient>
            </defs>
            <circle cx="12" cy="12" r="9" fill="none" stroke="url(#lg)" stroke-width="2.5"/>
            <circle cx="12" cy="12" r="3.2" fill="url(#lg)"/>
          </svg>
        </span>
        <div class="brand__text">
          <h1>Lumen</h1>
          <p>A calmer way to get things done.</p>
        </div>
      </div>
      <button id="themeToggle" class="icon-btn" title="Toggle theme" aria-label="Toggle light or dark theme">
        <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0-13a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V5a1 1 0 0 1 1-1Zm0 14a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1ZM4 12a1 1 0 0 1 1-1h1a1 1 0 1 1 0 2H5a1 1 0 0 1-1-1Zm14 0a1 1 0 0 1 1-1h1a1 1 0 1 1 0 2h-1a1 1 0 0 1-1-1ZM6.3 6.3a1 1 0 0 1 1.4 0l.7.7A1 1 0 1 1 7 8.4l-.7-.7a1 1 0 0 1 0-1.4Zm9.6 9.6a1 1 0 0 1 1.4 0l.7.7a1 1 0 0 1-1.4 1.4l-.7-.7a1 1 0 0 1 0-1.4Zm1.4-9.6a1 1 0 0 1 0 1.4l-.7.7A1 1 0 0 1 15.2 7l.7-.7a1 1 0 0 1 1.4 0ZM7.7 15.9a1 1 0 0 1 0 1.4l-.7.7A1 1 0 0 1 5.6 16.6l.7-.7a1 1 0 0 1 1.4 0Z"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M21 12.8A8.5 8.5 0 0 1 11.2 3a7 7 0 1 0 9.8 9.8Z"/></svg>
      </button>
    </header>

    <!-- Overview -->
    <section class="overview">
      <div class="ring-card">
        <svg class="ring" viewBox="0 0 120 120" width="118" height="118">
          <circle class="ring__track" cx="60" cy="60" r="52" />
          <circle class="ring__value" cx="60" cy="60" r="52" id="ringValue" />
        </svg>
        <div class="ring__label">
          <strong id="ringPct">0%</strong>
          <span>done</span>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><span class="stat__num" id="statTotal">0</span><span class="stat__key">Total</span></div>
        <div class="stat"><span class="stat__num" id="statActive">0</span><span class="stat__key">Active</span></div>
        <div class="stat"><span class="stat__num" id="statDone">0</span><span class="stat__key">Done</span></div>
        <div class="stat stat--warn"><span class="stat__num" id="statOverdue">0</span><span class="stat__key">Overdue</span></div>
      </div>
    </section>

    <!-- Composer -->
    <section class="composer">
      <form id="composer" autocomplete="off">
        <button type="submit" class="composer__add" title="Add task" aria-label="Add task">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M11 5a1 1 0 1 1 2 0v6h6a1 1 0 1 1 0 2h-6v6a1 1 0 1 1-2 0v-6H5a1 1 0 1 1 0-2h6V5Z"/></svg>
        </button>
        <input id="newTitle" class="composer__title" type="text" placeholder="What needs doing?" maxlength="200" required />
        <div class="composer__meta">
          <div class="seg" id="prioritySeg" role="group" aria-label="Priority">
            <button type="button" data-priority="low"    class="seg__btn">Low</button>
            <button type="button" data-priority="medium" class="seg__btn is-active">Med</button>
            <button type="button" data-priority="high"   class="seg__btn">High</button>
          </div>
          <input id="newTag" class="field field--tag" type="text" placeholder="# tag" maxlength="24" />
          <input id="newDue" class="field field--date" type="date" aria-label="Due date" />
        </div>
      </form>
    </section>

    <!-- Toolbar -->
    <section class="toolbar">
      <div class="search">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M10 4a6 6 0 1 0 3.8 10.7l4.7 4.8a1 1 0 0 0 1.5-1.4l-4.8-4.7A6 6 0 0 0 10 4Zm-4 6a4 4 0 1 1 8 0 4 4 0 0 1-8 0Z"/></svg>
        <input id="search" type="search" placeholder="Search tasks…" aria-label="Search tasks" />
      </div>
      <div class="filters" id="filters" role="group" aria-label="Filter">
        <button class="chip is-active" data-filter="all">All</button>
        <button class="chip" data-filter="active">Active</button>
        <button class="chip" data-filter="completed">Completed</button>
      </div>
    </section>

    <!-- List -->
    <ul id="list" class="list" aria-live="polite"></ul>

    <!-- Empty state -->
    <div id="empty" class="empty" hidden>
      <div class="empty__mark">✺</div>
      <h2>Nothing here yet</h2>
      <p>Add your first task above and it’ll show up right here.</p>
    </div>

    <footer class="footer">
      <span>Lumen</span><span class="dot">·</span><span>Postgres + Docker</span><span class="dot">·</span><span id="storeBadge">storage</span>
    </footer>
  </main>

  <!-- Edit dialog -->
  <dialog id="editDialog" class="dialog">
    <form method="dialog" id="editForm" class="dialog__form">
      <h3>Edit task</h3>
      <label class="lbl">Title
        <input id="editTitle" type="text" maxlength="200" required />
      </label>
      <label class="lbl">Notes
        <textarea id="editNotes" rows="3" maxlength="1000" placeholder="Add details…"></textarea>
      </label>
      <div class="dialog__row">
        <label class="lbl">Priority
          <select id="editPriority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </label>
        <label class="lbl">Tag
          <input id="editTag" type="text" maxlength="24" placeholder="tag" />
        </label>
        <label class="lbl">Due
          <input id="editDue" type="date" />
        </label>
      </div>
      <div class="dialog__actions">
        <button type="button" id="editCancel" class="btn btn--ghost">Cancel</button>
        <button type="submit" class="btn btn--primary">Save changes</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/app.js"></script>
</body>
</html>
