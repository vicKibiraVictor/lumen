name: Publish Docker image

# Builds the web image and pushes it to Docker Hub.
#  - every push to main      -> tags :latest and :sha-xxxxxxx
#  - every git tag v1.2.3     -> tags :1.2.3 and :1.2
#  - "Run workflow" button    -> manual build
# When this workflow runs.
on:
  push:
    branches: [main]      # any commit to main
    tags: ['v*']          # any tag starting with "v" (e.g. v1.2.3)
  workflow_dispatch:      # the manual "Run workflow" button in the Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest   # GitHub spins up a fresh Linux machine for the job
    steps:
      # Download your repo's code onto the runner so it can be built.
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Docker's advanced builder (needed for layer caching below).
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Sign in to Docker Hub using the secrets you added in repo settings,
      # so the push step is allowed to upload the image.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Decide which tags the image should get based on what triggered the run.
      # Outputs are read by the next step via steps.meta.outputs.*
      #   push to main  -> :latest and :sha-<commit>
      #   tag v1.2.3     -> :1.2.3 and :1.2
      - name: Work out image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/lumen-web   # the image name on Docker Hub
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}  # :latest only on main
            type=sha,format=short                               # :sha-<commit>
            type=semver,pattern={{version}}                     # full version on a git tag
            type=semver,pattern={{major}}.{{minor}}             # short version on a git tag

      # Build the image from ./app/Dockerfile and push every tag from above.
      # cache-from/to reuse layers between runs so rebuilds are much faster.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app                        # folder containing the Dockerfile
          push: true                            # upload the result to Docker Hub
          tags: ${{ steps.meta.outputs.tags }}  # tags computed in the previous step
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha                  # pull build cache from GitHub Actions
          cache-to: type=gha,mode=max           # save build cache for next time
